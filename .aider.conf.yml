# Configuration for Aider optimized for Cloudflare OpenRouter Proxy & Poolside Laguna XS.2
# Place this file in your project root directory sebaris dengan package-lock.json

# 1. Tetapan Model Utama & Model Lemah (Memaksa penggunaan model Laguna XS.2)
model: openrouter/openai/poolside/laguna-xs-2.1:free
weak-model: openrouter/openai/poolside/laguna-xs-2.1:free

# 2. Pembukaan Kunci Kapasiti Maksimum Token Model
# Memaksa Aider memaksimumkan ruangan output sehingga 32k token gred industri
max-out-tokens: 32000

# 3. Kawalan Kestabilan & Penjimatan Kos API (Anti-429 Rate Limit)
auto-commits: false
auto-test: false
analytics: false
suggest-shell-commands: false

# 4. Pengurusan Memori & Peta Konteks Kod
# Mengoptimumkan pembacaan peta fail dalam lingkungan 256k context window
map-tokens: 2048
cache-prompts: true

# 5. Antaramuka Aliran Koding
stream: true
dark-mode: true
gui: false